<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMB Bus Dashboard — Premium Beige Edition</title>
    <style>
        /* Modern, Elegant Beige Design System with Enhanced Text Scale */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f0ea; /* Premium warm beige / linen */
            color: #1a1a1a; /* Soft charcoal black */
            margin: 40px auto;
            padding: 0;
            max-width: 650px;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid #d9d4cc;
            padding-bottom: 22px;
            margin-bottom: 45px;
        }

        #time-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #time {
            font-size: 56px; 
            font-weight: 300; 
            letter-spacing: -0.03em;
            color: #1a1a1a;
            line-height: 1;
        }

        #date {
            font-size: 15px; 
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #7c766c;
        }

        #meta {
            font-size: 15px; 
            font-weight: 400;
            color: #5c5750;
            text-align: right;
            line-height: 1.8;
        }

        .weather-line {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }

        .weather-icon {
            font-size: 16px;
            color: #1a1a1a;
        }

        .stop-banner {
            font-size: 16px; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #7c766c;
            margin-bottom: 40px;
            border-left: 2.5px solid #1a1a1a;
            padding-left: 14px;
        }

        .route-section {
            margin-bottom: 50px;
        }

        .route-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 10px;
            margin-bottom: 18px;
        }

        .route-title {
            font-size: 28px; 
            font-weight: 400;
            font-family: "Didot", "Bodoni MT", "Cinzel", serif; 
            letter-spacing: -0.02em;
            color: #1a1a1a;
        }

        .destination {
            font-size: 15px; 
            font-weight: 400;
            color: #5c5750;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 18px 0; 
            vertical-align: middle;
            border-bottom: 1px solid #e3ded5;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .seq {
            width: 15%;
            font-size: 14px; 
            font-weight: 500;
            color: #a6a095;
            letter-spacing: 0.05em;
        }

        .eta-container {
            text-align: right;
            width: 85%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .actual-time {
            font-size: 22px; 
            font-weight: 400;
            color: #1a1a1a;
        }

        .relative-mins {
            font-size: 18px; 
            font-weight: 500;
            color: #1a1a1a;
        }
        
        .arriving-soon {
            color: #7c766c;
            font-style: italic;
        }

        .status-msg {
            font-size: 15px;
            font-style: italic;
            padding: 22px 0;
            color: #7c766c;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="header">
        <div id="time-container">
            <div id="date">00/00</div>
            <div id="time">00:00</div>
        </div>
        <div id="meta">Analyzing environment...</div>
    </div>

    <!-- STOP GROUP BANNER -->
    <div class="stop-banner">元朗喜利徑 &bull; Hi Lee Path</div>
    
    <!-- 1st TABLE: ROUTE 268X -->
    <div class="route-section">
        <div class="route-header">
            <div class="route-title">Route 268X</div>
            <div class="destination">To Jordan</div>
        </div>
        <table>
            <tbody id="eta-rows-268x">
                <tr>
                    <td colspan="2" class="status-msg">Connecting to schedule services...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 2nd TABLE: ROUTE 68X -->
    <div class="route-section">
        <div class="route-header">
            <div class="route-title">Route 68X</div>
            <div class="destination">To Mong Kok</div>
        </div>
        <table>
            <tbody id="eta-rows-68x">
                <tr>
                    <td colspan="2" class="status-msg">Connecting to schedule services...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // CONFIGURATION: 
        var USE_PROXY = false; 
        var PROXY = "https://corsproxy.io/?";
        var HKO_API = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en";
        var HKO_FORECAST_API = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=en";

        var STOP_268X = "221A18C37331E6FD";
        var STOP_68X  = "48FBCEF0B05599F8";

        var API_268X = "https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/" + STOP_268X;
        var API_68X  = "https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/" + STOP_68X;

        var currentRealFeel = "--";
        var currentHumidity = "--";
        var currentIconStr = "—";
        
        var tomorrowRealFeelRange = "-- - --";
        var tomorrowTempIconStr = "—";
        var tomorrowRainPSR = "Calculating";
        var tomorrowIconStr = "—";

        // 1. Clock and Date Engine
        function updateClock() {
            var now = new Date();
            var hrs = now.getHours();
            var mins = now.getMinutes();
            if (hrs < 10) hrs = "0" + hrs;
            if (mins < 10) mins = "0" + mins;
            document.getElementById("time").innerHTML = hrs + ":" + mins;

            var day = now.getDate();
            var month = now.toLocaleString('en-US', { month: 'short' });
            document.getElementById("date").innerHTML = month + " " + day;
        }

        // RealFeel / Humidex Approximation formula calculation
        function calculateRealFeel(temp, rh) {
            var e = (6.11 * Math.exp(5417.7530 * (1/273.16 - 1/(273.15 + temp))));
            var h = temp + (0.5555 * (e - 10.0));
            return Math.round(h);
        }

        // Beautiful Minimal Unicode Weather Mapping
        function getWeatherIcon(iconId) {
            var id = parseInt(iconId);
            if ([50, 51, 52, 60, 61].indexOf(id) !== -1) return "☀️"; 
            if ([53, 54, 62, 63].indexOf(id) !== -1) return "⛅"; 
            if ([57, 58, 59, 64, 65].indexOf(id) !== -1) return "☁️"; 
            if ([66, 67, 68, 69].indexOf(id) !== -1) return "🌙"; 
            if ([70, 71, 72, 73, 74, 75, 76, 77].indexOf(id) !== -1) return "🌧️"; 
            if ([80, 81, 82, 83, 84, 85].indexOf(id) !== -1) return "⛈️"; 
            if ([90, 91, 92, 93].indexOf(id) !== -1) return "❄️"; 
            return "✨";
        }

        function getForecastPSRNameAndIcon(psrString) {
            var psr = psrString.toLowerCase();
            if (psr === "low") return { text: "Low", icon: "☀️" };
            if (psr === "medium low") return { text: "Medium Low", icon: "⛅" };
            if (psr === "medium") return { text: "Medium", icon: "🌦️" };
            if (psr === "medium high") return { text: "Medium High", icon: "🌧️" };
            if (psr === "high") return { text: "High", icon: "⛈️" };
            return { text: psrString, icon: "🔮" };
        }

        function renderWeatherDisplay() {
            document.getElementById("meta").innerHTML = 
                "<div class='weather-line'>Now &bull; RealFeel " + currentRealFeel + "° &bull; Humid " + currentHumidity + "% <span class='weather-icon'>" + currentIconStr + "</span></div>" + 
                "<div class='weather-line'>Tomorrow RealFeel &bull; " + tomorrowRealFeelRange + "°C <span class='weather-icon'>" + tomorrowTempIconStr + "</span></div>" +
                "<div class='weather-line'>Tomorrow Rain Forecast &bull; " + tomorrowRainPSR + " <span class='weather-icon'>" + tomorrowIconStr + "</span></div>";
        }

        // 2. Weather Engine
        function fetchWeather() {
            var url = USE_PROXY ? (PROXY + encodeURIComponent(HKO_API)) : HKO_API;
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        var temp = data.temperature.data[0].value; 
                        for (var i = 0; i < data.temperature.data.length; i++) {
                            if (data.temperature.data[i].place === "Yuen Long") {
                                temp = data.temperature.data[i].value;
                                break;
                            }
                        }
                        currentHumidity = data.humidity.data[0].value;
                        currentRealFeel = calculateRealFeel(temp, currentHumidity);
                        
                        if (data.icon && data.icon.length > 0) {
                            currentIconStr = getWeatherIcon(data.icon[0]);
                        }
                        renderWeatherDisplay();
                    } catch (e) {
                        renderWeatherDisplay();
                    }
                }
            };
            xhr.send();
        }

        // 3. Forecast Engine (Processes Tomorrow's RealFeel range and Rain probability)
        function fetchForecast() {
            var url = USE_PROXY ? (PROXY + encodeURIComponent(HKO_FORECAST_API)) : HKO_FORECAST_API;
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        if (data.weatherForecast && data.weatherForecast.length > 1) {
                            var tomorrowData = data.weatherForecast[1];
                            
                            var minTemp = tomorrowData.forecastMintemp.value;
                            var maxTemp = tomorrowData.forecastMaxtemp.value;
                            var minRh = tomorrowData.forecastMinrh.value;
                            var maxRh = tomorrowData.forecastMaxrh.value;
                            
                            var realFeelMin = calculateRealFeel(minTemp, maxRh); 
                            var realFeelMax = calculateRealFeel(maxTemp, minRh);
                            tomorrowRealFeelRange = realFeelMin + " - " + realFeelMax;

                            if (tomorrowData.ForecastIcon) {
                                tomorrowTempIconStr = getWeatherIcon(tomorrowData.ForecastIcon);
                            } else if (tomorrowData.forecastIcon) {
                                tomorrowTempIconStr = getWeatherIcon(tomorrowData.forecastIcon);
                            } else {
                                tomorrowTempIconStr = "🌡️";
                            }

                            var psrData = getForecastPSRNameAndIcon(tomorrowData.PSR);
                            tomorrowRainPSR = psrData.text;
                            tomorrowIconStr = psrData.icon;
                        }
                        renderWeatherDisplay();
                    } catch (e) {
                        renderWeatherDisplay();
                    }
                }
            };
            xhr.send();
        }

        function fetchRouteETA(apiEndpoint, routeTarget, targetElementId) {
            var url = USE_PROXY ? (PROXY + encodeURIComponent(apiEndpoint)) : apiEndpoint;
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var response = JSON.parse(xhr.responseText);
                            var list = response.data;
                            var sortedEtas = [];
                            var seenClocks = {}; 

                            for (var i = 0; i < list.length; i++) {
                                var item = list[i];
                                
                                if (item.route === routeTarget && item.eta) {
                                    var etaTime = new Date(item.eta);
                                    var baseTime = new Date(item.data_timestamp);
                                    
                                    var diffMs = etaTime - baseTime;
                                    var diffMins = Math.max(0, Math.floor(diffMs / 1000 / 60));
                                    
                                    var etaHours = etaTime.getHours();
                                    var etaMins = etaTime.getMinutes();
                                    if (etaHours < 10) etaHours = "0" + etaHours;
                                    if (etaMins < 10) etaMins = "0" + etaMins;
                                    var clockString = etaHours + ":" + etaMins;
                                    
                                    if (!seenClocks[clockString]) {
                                        seenClocks[clockString] = true;
                                        sortedEtas.push({
                                            mins: diffMins,
                                            clock: clockString,
                                            seq: item.eta_seq
                                        });
                                    }
                                }
                            }

                            sortedEtas.sort(function(a, b) { return a.seq - b.seq; });

                            var html = "";
                            if (sortedEtas.length === 0) {
                                html = "<tr><td class='status-msg'>No scheduled runs remaining today.</td></tr>";
                            } else {
                                for (var j = 0; j < sortedEtas.length; j++) {
                                    var bus = sortedEtas[j];
                                    var isArriving = bus.mins <= 1;
                                    var timeDisplay = isArriving ? "Arriving" : bus.mins + " min";
                                    var arrivingClass = isArriving ? "arriving-soon" : "";
                                    
                                    html += "<tr>" +
                                                "<td class='seq'>NO. 0" + (j + 1) + "</td>" +
                                                "<td class='eta-container'>" +
                                                    "<div class='actual-time'>" + bus.clock + "</div>" +
                                                    "<div class='relative-mins " + arrivingClass + "'>" + timeDisplay + "</div>" +
                                                "</td>" +
                                            "</tr>";
                                }
                            }
                            document.getElementById(targetElementId).innerHTML = html;

                        } catch (err) {
                            document.getElementById(targetElementId).innerHTML = "<tr><td class='status-msg'>Data formatting error.</td></tr>";
                        }
                    } else {
                        document.getElementById(targetElementId).innerHTML = "<tr><td class='status-msg'>Service unavailable (" + xhr.status + ")</td></tr>";
                    }
                }
            };
            xhr.send();
        }

        function masterRefresh() {
            updateClock();
            fetchRouteETA(API_268X, "268X", "eta-rows-268x");
            fetchRouteETA(API_68X, "68X", "eta-rows-68x");
        }

        // Initial Executions
        updateClock();
        fetchWeather();
        fetchForecast();
        fetchRouteETA(API_268X, "268X", "eta-rows-268x");
        fetchRouteETA(API_68X, "68X", "eta-rows-68x");

        // Execution Loops
        setInterval(masterRefresh, 1000 * 30);       // Bus data & system clock now update every 30 seconds
        setInterval(fetchWeather, 1000 * 60 * 15);    // Weather current data updates every 15 minutes
        setInterval(fetchForecast, 1000 * 60 * 60);   // Daily outlook forecast updates every hour
    </script>
</body>
</html>

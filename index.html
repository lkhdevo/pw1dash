<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>KMB Bus ETA</title>
    <style>
        /* Primitive CSS safe for Kindle Paperwhite 1 NetFront Engine */
        body {
            font-family: monospace;
            background-color: #ffffff;
            color: #000000;
            margin: 5px;
            padding: 0;
        }
        .stop-banner {
            background-color: #000000;
            color: #ffffff;
            padding: 5px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }
        .route-title {
            font-size: 28px;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 2px;
            text-align: center;
        }
        .destination {
            font-size: 14px;
            margin-bottom: 10px;
            color: #444444;
            text-align: center;
        }
        table {
            width: 100%;
            margin-bottom: 20px;
        }
        td {
            padding: 10px 2px;
            font-weight: bold;
            font-size: 20px;
            border-bottom: 1px dashed #000000;
            text-align: center;
        }
        .status-msg {
            font-size: 14px;
            color: #555555;
        }
    </style>
</head>
<body>

    <!-- STOP GROUP BANNER -->
    <div class="stop-banner">元朗喜利徑 Hi Lee Path (YL367)</div>
    
    <!-- 1st TABLE: ROUTE 268X -->
    <div class="route-title">ROUTE 268X</div>
    <div class="destination">往 佐敦 (西九龍站) / To Jordan</div>
    <table cellpadding="0" cellspacing="0">
        <tbody id="eta-rows-268x">
            <tr><td class="status-msg">Loading 268X...</td></tr>
        </tbody>
    </table>

    <!-- 2nd TABLE: ROUTE 68X -->
    <div class="route-title">ROUTE 68X</div>
    <div class="destination">往 旺角 (柏景灣) / To Mong Kok (Park Avenue)</div>
    <table cellpadding="0" cellspacing="0">
        <tbody id="eta-rows-68x">
            <tr><td class="status-msg">Loading 68X...</td></tr>
        </tbody>
    </table>

    <script type="text/javascript">
        // Basic variables compatible with older JS engines
        var USE_PROXY = false; 
        var PROXY = "https://corsproxy.io/?";

        var STOP_268X = "221A18C37331E6FD";
        var STOP_68X  = "48FBCEF0B05599F8";

        var API_268X = "https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/" + STOP_268X;
        var API_68X  = "https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/" + STOP_68X;

        // Legacy AJAX engine without modern JSON parsing to avoid native Kindle browser crashes
        function fetchRouteETA(apiEndpoint, routeTarget, targetElementId) {
            var url = USE_PROXY ? (PROXY + escape(apiEndpoint)) : apiEndpoint;
            var xhr = new XMLHttpRequest();
            
            xhr.open("GET", url, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var rawText = xhr.responseText;
                        var html = "";
                        var matchCount = 0;
                        
                        // Fallback primitive parser: Split text by data blocks manually
                        var blocks = rawText.split('{"co"');
                        
                        for (var i = 1; i < blocks.length; i++) {
                            var block = blocks[i];
                            
                            // Check if this block belongs to our target route
                            if (block.indexOf('"route":"' + routeTarget + '"') !== -1) {
                                // Extract ETA timestamp value manually via primitive string parsing
                                var etaIdx = block.indexOf('"eta":"');
                                if (etaIdx !== -1) {
                                    var etaStr = block.substring(etaIdx + 7, etaIdx + 26); // Grab "YYYY-MM-DDTHH:MM:SS"
                                    
                                    // Extract Timestamp value manually
                                    var stampIdx = block.indexOf('"data_timestamp":"');
                                    var stampStr = "";
                                    if (stampIdx !== -1) {
                                        stampStr = block.substring(stampIdx + 18, stampIdx + 37);
                                    }
                                    
                                    if (etaStr && etaStr.indexOf('null') === -1 && etaStr.length >= 16) {
                                        // Parse out Clock time strings safely via index cuts
                                        var clockString = etaStr.substring(11, 16); // "HH:MM"
                                        
                                        // Simple rough estimation of minutes to remain compliant with legacy Date formats
                                        var etaH = parseInt(etaStr.substring(11, 13), 10);
                                        var etaM = parseInt(etaStr.substring(14, 16), 10);
                                        
                                        var curH = new Date().getHours();
                                        var curM = new Date().getMinutes();
                                        
                                        var diffMins = ((etaH * 60) + etaM) - ((curH * 60) + curM);
                                        if (diffMins < 0) diffMins = 0;
                                        
                                        var timeDisplay = diffMins <= 1 ? "Arriving / 到站中" : diffMins + " mins";
                                        
                                        html += "<tr><td>" + clockString + " (" + timeDisplay + ")</td></tr>";
                                        matchCount++;
                                    }
                                }
                            }
                            // Limit records to top 3 to accommodate minimal screen heights on e-readers
                            if (matchCount >= 3) break;
                        }
                        
                        if (html === "") {
                            html = "<tr><td class='status-msg'>No runs scheduled.</td></tr>";
                        }
                        document.getElementById(targetElementId).innerHTML = html;
                    } else {
                        document.getElementById(targetElementId).innerHTML = "<tr><td class='status-msg'>Error: " + xhr.status + "</td></tr>";
                    }
                }
            };
            xhr.send();
        }

        function masterRefresh() {
            fetchRouteETA(API_268X, "268X", "eta-rows-268x");
            fetchRouteETA(API_68X, "68X", "eta-rows-68x");
        }

        // Trigger loading sequentially
        masterRefresh();

        // 1-minute auto-refresh cycle loop
        setInterval(masterRefresh, 1000 * 60);     
    </script>
</body>
</html>
